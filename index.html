<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Chamber Music Planner</title>
<style>
:root{--bg:#f6f7f8;--card:#fff;--ink:#172026;--muted:#667085;--line:#e6e9ee;--green:#0b8f55;--blue:#0000FF;--red:#dc2626;--soft:#eef7f1;--purple:#7c3aed;--shadow:0 8px 26px rgba(16,24,40,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink)}
.wrap{max-width:560px;margin:0 auto;padding:14px 12px 48px}.top{padding:22px 14px 18px;text-align:center;background:#0000FF;color:#fff;border-radius:24px;box-shadow:var(--shadow);margin-bottom:12px}.title{font-size:28px;font-weight:800;letter-spacing:-.7px;color:#fff}.credit{font-size:12pt;color:#2ee06f;margin-top:5px;font-style:normal;text-align:center}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;margin:12px 0;box-shadow:var(--shadow)}
.section{font-size:17px;font-weight:750;margin:0 0 10px}.sub{font-size:12px;color:var(--muted);line-height:1.35}.label{font-size:12px;font-weight:700;color:#344054;margin:11px 0 5px}.grid1{display:grid;grid-template-columns:1fr;gap:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
select,input,button{font:inherit}select,input{width:100%;border:1px solid #d0d5dd;border-radius:13px;padding:11px 10px;background:#fff;color:#111827;min-height:44px}input[type=file]{font-size:12px;padding:10px;background:#fafafa}.btn{border:0;border-radius:15px;padding:13px 12px;background:#0000FF;color:#fff;font-weight:800;width:100%;margin-top:10px;min-height:46px}.btn2{border:1px solid #d0d5dd;border-radius:13px;background:#fff;color:#111827;font-weight:750;padding:10px 9px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:38px;width:100%}.btn.green{background:var(--green)}.btn.light{background:#e7f2eb;color:#084c2d}.btn.red{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.pill{border:1px solid #d5e6dc;background:#f3fbf6;color:#0f6b43;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:700}.pill.gray{background:#f3f4f6;color:#475467;border-color:#e5e7eb}
.work,.option{border:1px solid #e5e7eb;border-radius:18px;padding:12px;margin:10px 0;background:#fff}.work h3,.option h3{font-size:15px;line-height:1.25;margin:0 0 4px}.meta{font-size:12px;color:#475467;line-height:1.35}.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}.tag{font-size:11px;background:#f2f4f7;border-radius:999px;padding:4px 7px;color:#344054}.tag.green{background:#ecfdf3;color:#027a48}.tag.blue{background:#eff6ff;color:#1d4ed8}.tag.red{background:#fff1f2;color:#be123c}.tag.purple{background:#f5f3ff;color:#6d28d9}
.ytrow{margin-top:9px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.ytrow .btn2.red{background:#D900FF;color:#fff;border:0}.earsensebtn{background:#A51C30;color:#fff;border:0;font-size:inherit;font-weight:750;padding:10px 9px}.aibtn{background:#1A73E8;color:#fff;border:0;font-size:inherit;font-weight:750;padding:10px 9px}
.ytrow .btn2{min-width:0;padding:9px 4px;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media (max-width:380px){.ytrow{gap:4px}.ytrow .btn2{font-size:11px;padding:8px 2px}}
.optChk{display:flex;gap:10px;align-items:center;margin-top:9px;cursor:pointer}.optChk input{width:20px;height:20px;min-height:20px}.optChk span{font-size:12px;font-weight:700;color:#344054}
.progress{height:9px;background:#eef2f7;border-radius:999px;overflow:hidden;margin-top:8px}.bar{height:100%;background:var(--green);width:0}.notice{border-left:4px solid var(--green);background:var(--soft);padding:10px;border-radius:12px;color:#114b32;font-size:12px;line-height:1.35;margin-bottom:10px}.hide{display:none}.small{font-size:11px;color:#667085}.footer{font-size:11px;color:#667085;text-align:center;margin:20px 0}
#message{border-left:4px solid var(--blue);background:#eef3ff;padding:10px;border-radius:12px;color:#1d2c6b;font-size:12px;line-height:1.35;margin-bottom:10px}
.workChk{display:flex;gap:8px;align-items:center;margin-bottom:8px}.workChk input{width:18px;height:18px;min-height:18px}.workChk span{font-size:12px;font-weight:700;color:#344054}
.reloadLink{font-size:11px;color:#667085;text-align:center;margin-top:6px;text-decoration:underline;cursor:pointer}
.toggleBtn{border:1px dashed #c7cdd6;background:#f8fafc;color:#344054;border-radius:12px;padding:8px 10px;font-size:12px;font-weight:700;width:100%;margin-top:9px;cursor:pointer}
.optionWorks{margin-top:10px;border-top:1px dashed #e5e7eb;padding-top:8px}
@media(max-width:390px){.wrap{padding:10px 8px 40px}.grid2,.grid3{gap:6px}.label{font-size:10px;margin:8px 0 4px}select,input{font-size:12px;padding:8px 6px;min-height:38px}.section{font-size:15px}.title{font-size:22px}.optChk span{font-size:10px}.tag{font-size:10px;padding:3px 6px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="title">Chamber Music Planner</div><div class="credit">Hyun Mi Kim</div></div>

  <div class="card">
    <p class="section">Search</p>
    <div class="grid2">
      <div><div class="label">Composer</div><select id="composer"><option value="">Composer: any</option></select></div>
      <div><div class="label">Era</div><select id="era"><option value="">All Eras</option><option value="Renaissance">Renaissance (1400–1600)</option><option value="Baroque">Baroque (1600–1750)</option><option value="Classical">Classical (1750–1820)</option><option value="Romantic">Romantic (1820–1900)</option><option value="Contemporary">Contemporary (1900–Present)</option></select></div>
    </div>
    <div class="grid2">
      <div><div class="label">Ensemble</div><select id="ensemble"><option value="">Any ensemble</option><option>Solo</option><option>Duo</option><option>Violin Sonata</option><option>Piano Sonata</option><option>Cello Sonata</option><option>Trio</option><option>Quartet</option><option>Quintet</option><option>Sextet</option><option>Septet</option><option>Octet</option><option>Nonet</option><option>Decet</option><option>13 Players</option><option>Chamber Ensemble</option><option>Voice & Piano</option></select></div>
      <div><div class="label">Target Time</div><select id="target"><option value="">No target time</option><option value="40">40 min</option><option value="50">50 min</option><option value="60">60 min</option><option value="70">70 min</option><option value="80">80 min</option><option value="90">90 min</option></select></div>
    </div>
    <div class="grid2">
      <div style="grid-column:1 / -1"><div class="label">Sentence Search</div><input id="sentenceSearch" placeholder="e.g. dramatic string quartet for advanced listeners" /></div>
    </div>
    <div class="grid2">
      <div><div class="label">Audience Level</div><select id="audience"><option value="">Any</option><option>Beginner</option><option>General</option><option>Experienced</option></select></div>
      <div><div class="label">Country</div><select id="country"><option value="">Any</option><option>Germany</option><option>Italy</option><option>France</option><option>Austria</option><option>Russia</option><option>USA</option><option>England</option><option>Nordic Europe</option><option>Hungary</option><option>Czechoslovakia</option><option>Spain</option><option>Argentina</option></select></div>
    </div>
    <div class="grid2">
      <div><div class="label">Holiday</div><select id="holiday"><option value="">Any</option><option>Valentine's Day</option><option>Christmas</option><option>New Year</option><option>Brunch Concert</option><option>Picnic Concert</option></select></div>
      <div><div class="label">Familiarity</div><select id="familiarity"><option value="">Any</option><option>Famous</option><option>Known</option><option>Hidden Gem</option></select></div>
    </div>
    <div class="grid3">
      <div><div class="label">Mood / Atmosphere</div><select id="mood"><option value="">Any mood</option><option value="Romantic,Warm">Warm / Romantic</option><option value="Bright,Festive">Bright / Festive</option><option value="Dramatic">Dramatic</option><option value="Meditative,Calm">Meditative / Calm</option><option value="Spiritual">Spiritual</option></select></div>
      <div><div class="label">Children</div><select id="children"><option value="0">Any</option><option value="3">★★★+</option><option value="4">★★★★+</option><option value="5">★★★★★</option></select></div>
      <div><div class="label">Talkability</div><select id="talkability"><option value="0">Any</option><option value="3">★★★+</option><option value="4">★★★★+</option><option value="5">★★★★★</option></select></div>
    </div>
    <div class="grid1">
      <button class="btn" id="run">Search Program</button>
      <button class="btn light" id="reset">Reset</button>
    </div>
  </div>

  <div class="card">
    <p class="section" id="resultsTitle">Program Options</p>
    <div id="message" class="hide"></div>
    <div id="options"></div>
    <div id="candidates"></div>
  </div>

</div>

const ATMOS_VALUES=['Romantic','Warm','Bright','Festive','Dramatic','Meditative','Calm','Spiritual'];
function getComposerList(){return [...new Set(works.map(w=>w.composer))].filter(Boolean).sort()}
// Calls our own Cloudflare Pages Function (/api/parse-sentence), which holds
// the Anthropic API key server-side and forwards to Claude. Returns null on
// any failure (offline, not deployed on Cloudflare Pages, timeout, etc.) so
// the existing keyword-based sentence search is always a safe fallback.
async function fetchAIHints(text){
  try{
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(),7000);
    const res=await fetch('/api/parse-sentence',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({text,composerList:getComposerList(),options:{ensemble:ENSEMBLE_VALUES,era:ERA_VALUES,audience:AUDIENCE_VALUES,familiarity:FAMILIARITY_VALUES,country:COUNTRY_VALUES,atmos:ATMOS_VALUES}}),
      signal:controller.signal
    });
    clearTimeout(timer);
    if(!res.ok) return null;
    const data=await res.json();
    if(!data||data.error) return null;
    return data;
  }catch(e){ return null; }
}

function norm(s){return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[“”]/g,'"').replace(/[’]/g,"'").replace(/[^a-z0-9]+/g,' ').trim()}
const SENTENCE_STOPWORDS=new Set(['a','an','the','for','and','with','of','in','on','is','are','to','that','this','it','me','my','i','find','search','song','piece','music','give','please','some','any','want','looking','like','something','me','play','playing','listen','listening']);
function sentenceTokens(s){return norm(s).split(' ').filter(t=>t && t.length>1 && !SENTENCE_STOPWORDS.has(t) && !/^[0-9]+$/.test(t))}

function tokenMatches(tok,w,hay){ if(hay.includes(tok)) return true; const mapped=SENTENCE_SYNONYMS[tok]; if(mapped){ if(w.audience===mapped) return true; if(w.familiarity===mapped) return true; if(w.atmos.includes(mapped)) return true; } const countryMapped=COUNTRY_SYNONYMS[tok]; if(countryMapped && w.country===countryMapped) return true; return false; }
function splitRow(line){let out=[],cur='',esc=false; for(let i=0;i<line.length;i++){let ch=line[i]; if(ch==='|'&&!esc){out.push(cur.trim());cur=''} else cur+=ch; esc=ch==='\\'&&!esc} out.push(cur.trim()); if(out[0]==='') out.shift(); if(out[out.length-1]==='') out.pop(); return out}
function blankIfNeedsCheck(v){ if(!v) return ''; const n=norm(v); if(n==='needs check'||v.trim()==='—') return ''; return v; }
function parseMarkdown(md,sourceName){const lines=md.split(/\r?\n/); let headers=null, rows=[]; for(const line of lines){if(!/^\s*\|/.test(line)) continue; const cells=splitRow(line); if(cells.length<5) continue; const low=cells.map(c=>norm(c)); if(low.includes('composer')&&low.includes('work')){headers=cells; continue} if(headers && /^[-: ]+$/.test(cells.join('').replace(/\|/g,''))) continue; if(headers){let o={}; headers.forEach((h,i)=>o[h]=cells[i]||''); rows.push(o)}} return rows.map(r=>standardize(r,sourceName)).filter(Boolean)}
function parseJSON(txt,sourceName){let arr; try{arr=JSON.parse(txt)}catch(e){return[]} if(!Array.isArray(arr)) return []; return arr.map(r=>standardize(r,sourceName)).filter(Boolean)}
function standardize(r,sourceName){const c=r.Composer||r.composer||''; const w=r.Work||r.Title||r.work||''; if(!c||!w||norm(c)==='composer'||norm(w)==='work') return null; let pc=parseInt(r['Performance Count']||r.performanceCount||r.Count||0)||0; const years=r['Performance Years']||r.Years||''; if(!pc&&years) pc=(years.match(/\b(19|20)\d{2}\b/g)||[]).length; const ensRaw=blankIfNeedsCheck(r.Ensemble||r.ensemble); const instRaw=blankIfNeedsCheck(r.Instrumentation||r['Original Instrumentation']||r.instrumentation); const ens=ensRaw||inferEnsemble(w,instRaw); const period=blankIfNeedsCheck(r['Style Period']||r.Period||r.period)||inferPeriod(c); const status=blankIfNeedsCheck(r.Status||r.status); return enrich({composer:c,work:w,opus:blankIfNeedsCheck(r['Opus / Catalogue']||r['Opus/Catalogue']||''),period,ensemble:ens,instrumentation:instRaw,family:blankIfNeedsCheck(r.Family||r['Instrument Families']||''),status,years,performanceCount:pc,source:sourceName.includes('Marlboro')||sourceName.toLowerCase().includes('marlboro')?'Marlboro':'Catalog',notes:r.Notes||''})}
function inferEnsemble(work,inst){const s=norm(work+' '+inst); const explicitSolo=/for solo|unaccompanied|solo violin|solo cello|solo viola|solo flute|solo clarinet|solo oboe|solo bassoon|solo guitar/.test(s); const multiHint=/quintet|quartet|sextet|septet|octet|nonet|decet|ensemble|orchestra|wind|duo|trio|four hands|piano four/.test(s); const soloInstrument=/\b(violin|cello|viola|flute|oboe|clarinet|guitar|bassoon)\b/.test(s); const partitaSolo=/\bpartita\b/.test(s)&&soloInstrument&&!multiHint; const capriceSolo=/\bcaprice/.test(s)&&!multiHint; if(explicitSolo||partitaSolo||capriceSolo) return 'Solo'; const map=[['duo','Duo'],['sonata','Duo'],['trio','Trio'],['quartet','Quartet'],['quintet','Quintet'],['sextet','Sextet'],['septet','Septet'],['octet','Octet'],['nonet','Nonet'],['decet','Decet']]; for(const [k,v] of map){if(s.includes(k)) return v} return 'Chamber Ensemble'}
function inferPeriod(c){const n=norm(c); if(/bach|handel|purcell|scarlatti|vivaldi/.test(n))return 'Baroque'; if(/mozart|haydn|beethoven/.test(n))return 'Classical'; if(/schubert|schumann|brahms|dvorak|faure|mendelssohn|tchaikovsky|franck|bruckner/.test(n))return 'Romantic'; if(/debussy|ravel|schoenberg|webern|berg|bartok|stravinsky|shostakovich|prokofiev|britten|barber|messiaen/.test(n))return 'Modern / 20th Century'; return ''}
function estimateDuration(w){const s=norm(w.work+' '+w.ensemble); const e=w.ensemble; if(s.includes('quartettsatz')) return 10; if(s.includes('grosse fuge')) return 16; if(s.includes('death and the maiden')) return 40; if(s.includes('rosamunde')) return 35; if(s.includes('archduke')) return 42; if(s.includes('trout')) return 39; if(s.includes('gran partita')) return 50; if(s.includes('appalachian spring')) return 25; if(s.includes('verklärte')||s.includes('verklarte')) return 30; if(s.includes('clarinet quintet')) return 33; if(s.includes('piano quintet')) return 32; if(s.includes('piano quartet')) return 28; if(s.includes('piano trio')) return 30; if(s.includes('string quartet')) return 30; if(e==='Duo') return 16; if(e==='Trio') return 24; if(e==='Quartet') return 28; if(e==='Quintet') return 30; if(e==='Sextet') return 31; if(e==='Septet') return 38; if(e==='Octet') return 35; if(e==='Nonet'||e==='Decet') return 25; return 18}
function inferAtmos(w){const s=norm(w.composer+' '+w.work+' '+w.period); let a=[]; if(/faure|schumann|brahms|dvorak|schubert|mendelssohn|romance|nocturne|lieder|song|serenade/.test(s)) a.push('Romantic','Warm'); if(/mozart|haydn|divertimento|serenade|quintet/.test(s)) a.push('Bright','Warm'); if(/bach|handel|chorale|mass|hymn|motet|spiritual/.test(s)) a.push('Spiritual','Calm'); if(/shostakovich|bartok|berg|schoenberg|webern|death|minor|fugue|lyric suite/.test(s)) a.push('Dramatic','Experienced'); if(/debussy|ravel|messiaen|takemitsu/.test(s)) a.push('Meditative','Calm'); if(/christmas|noel|pastorale|new year|spring/.test(s)) a.push('Festive'); if(/piazzolla|strum|shaw|montgomery/.test(s)) a.push('Bright'); if(!a.length) a=['Warm']; return [...new Set(a.filter(x=>x!=='Experienced'))]}
function inferAudience(w){const s=norm(w.composer+' '+w.work+' '+w.period); if(/webern|berg|schoenberg|bartok|ligeti|carter|schnittke|lutoslawski|xenakis|late quartet|op 130|op 131|op 132|op 133|op 135/.test(s)) return 'Experienced'; if(/mozart|haydn|dvorak|mendelssohn|faure|schubert trout|beethoven archduke|clarinet quintet|piano quintet|piazzolla|strum/.test(s)) return 'Beginner'; return 'General'}
function inferFamiliarity(w){const score=(w.performanceCount||0); const s=norm(w.work); if(score>=15||/archduke|trout|death and the maiden|american|clarinet quintet|piano quintet|octet|septet|appalachian/.test(s)) return 'Famous'; if(score>=4) return 'Known'; return 'Hidden Gem'}

function timbreFamilies(w){
  const fam=(w.family||'').trim();
  if(fam) return new Set(fam.split(',').map(s=>s.trim()).filter(Boolean)).size;
  const instr=norm(w.instrumentation||'');
  if(!instr) return 1;
  let n=0;
  if(/pno|piano/.test(instr)) n++;
  if(/\bvn\b|\bva\b|\bvc\b|\bdb\b|violin|viola|cello|bass/.test(instr)) n++;
  if(/\bfl\b|\bob\b|\bcl\b|\bbsn\b|\bhn\b|flute|oboe|clarinet|bassoon|horn|trumpet|tpt|trombone|tbn/.test(instr)) n++;

  if(/perc/.test(instr)) n++;
  return Math.max(1,n);

function buildSingleProgram(pool,target,atmosPenalty,smart,allowRepeatComposer,guaranteeEasy){

    const smart=!f.familiarity;
    const guaranteeEasy=!!(f.children||f.audience);
    const allowRepeatComposer=!!(f.composer||(f.aiComposers&&f.aiComposers.length));
    let opts=buildPrograms(c,f.target,4,smart,allowRepeatComposer,guaranteeEasy);
    let relaxed=false;
    if(!opts.length && f.composer && (f.audience||f.country||f.era||f.familiarity||f.holiday)){
      // Narrow composer catalogs can run out of matches once mood/holiday/familiarity
      // filters are added on top. Retry with just Composer + Ensemble kept,
      // rather than silently failing.
      const broader=works.filter(w=>{
        if(f.composer!=='Other'&&w.composer!==f.composer) return false;
        if(f.composer==='Other'&&TOP20.includes(w.composer)) return false;
        if(f.ensemble){const target=norm(f.ensemble); const hay=norm(w.work+' '+w.instrumentation); const wordsMatch=target.split(' ').every(tok=>hay.includes(tok)); if(w.ensemble!==f.ensemble && !wordsMatch) return false;}
        return true;
      }).sort((a,b)=>scoreWork(b,f)-scoreWork(a,f));
      opts=buildPrograms(broader,f.target,4,true,true);
      relaxed=opts.length>0;
    }
    renderOptions(opts,f.target,relaxed);
  } else {
    box.innerHTML='';
    if(!c.length){
      title.textContent='Works';
      candBox.innerHTML='<div class="notice">No works matched these filters.</div>';
    } else {
      const shown=c.slice(0,80);
      title.textContent=`Works (${c.length})`;
      const cap=c.length>80?`<div class="notice">Showing the first 80 of ${c.length} matches. Narrow a filter to see the rest.</div>`:'';
      candBox.innerHTML=cap+shown.map((w,i)=>renderWorkSelectable(w,i)).join('')
        +`<div class="grid2" style="margin-top:10px"><button class="btn2" id="selectWorksBtn">Select</button><button class="btn2 hide" id="showAllWorksBtn">Show All</button></div>`;
      bindWorksSelection();
    }
  }
  saveView();
}
function esc(s){return (s||'').toString().replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
document.getElementById('run').onclick=runSearch;
document.getElementById('reset').onclick=()=>{['composer','era','sentenceSearch','ensemble','target','audience','country','holiday','familiarity','mood','children','talkability'].forEach(id=>{const el=document.getElementById(id); el.value=(id==='children'||id==='talkability')?'0':''}); runSearch()};
loadLocal();
</script>
